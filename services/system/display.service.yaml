# CarrotOS Display Service Definition
# Manages graphical display server and window compositor

name: display
type: system
description: "Display server and compositor management"

# Service executable
executable: /usr/bin/weston
working_directory: /var/run/display

# Service behavior
restart_policy: always
restart_delay_ms: 2000
max_restart_attempts: 5

# Environment variables
environment:
  WAYLAND_DISPLAY: wayland-0
  XDG_RUNTIME_DIR: /run/user/1000
  QT_QPA_PLATFORM: wayland
  SDL_VIDEODRIVER: wayland

# Dependencies
start_after:
  - system-network
  - udev-service
  - logging-daemon

# Socket activation
sockets:
  - wayland-0
  - x11-display

# Logging
logging:
  level: INFO
  output: both
  file: /var/log/display.log
  max_size: 10M

# Resource limits
resources:
  memory_limit_mb: 512
  priority: high

# Security
security:
  requires_privileged: true
