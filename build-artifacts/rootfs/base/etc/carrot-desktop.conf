# CarrotOS Desktop Configuration
# Desktop environment and GUI settings

[general]
name=Carrot Desktop Environment
version=1.0
compositor=carrot-compositor

[theme]
default_theme=carrot-default
default_icon_theme=Papirus
color_scheme=dark
font_family=DejaVu Sans
font_size=10

[panel]
top_panel_enabled=true
top_panel_height=32
bottom_panel_enabled=true
bottom_panel_height=24
auto_hide=false

[shell]
shell_binary=/usr/bin/carrot-shell
compositor_binary=/usr/bin/carrot-compositor
launcher_binary=/usr/bin/carrot-launcher

[keyboard]
layout=us
variant=
options=grp:alt_shift_toggle

[mouse]
acceleration=1.0
sensitivity=1.0
double_click_timeout=400

[wallpaper]
enabled=true
path=/usr/share/pixmaps/carrot-background.png
scaling=fill
position=center

[applications]
applications_dir=/usr/share/applications:/usr/local/share/applications
favorites=org.gnome.Files,firefox,gnome-terminal,gedit
