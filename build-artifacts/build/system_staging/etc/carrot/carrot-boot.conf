# CarrotOS Boot Configuration
# Bootloader and kernel parameters

[boot]
timeout=5
default_entry=0
graphics_mode=1024x768x32

[kernel]
cmdline=ro quiet splash
modules=ext4,xhci_hcd,ahci

[graphics]
resolution=1920x1080
color_depth=32
refresh_rate=60

[security]
secure_boot=false
tpm_enabled=true
measured_boot=false

[performance]
kexec_enabled=true
numa_enabled=true

[recovery]
recovery_timeout=10
emergency_shell=true
