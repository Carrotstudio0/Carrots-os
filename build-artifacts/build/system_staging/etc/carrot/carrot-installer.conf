# CarrotOS Installer Configuration
# System installation and setup

[general]
installer_version=1.0
installer_timeout=1800
installation_dir=/target
live_system_dir=/live

[installation]
installation_type=full
disk_partitioning=auto
filesystem=ext4
enable_efi=true
enable_bios=true
create_swap=true
swap_size_gb=2

[partitioning]
boot_partition_size_mb=500
efi_partition_size_mb=200
root_partition_min_gb=10
home_partition_separate=true

[packages]
install_minimal_set=false
install_desktop=true
install_development=false
install_server=false
extra_packages=

[localization]
default_locale=en_US.UTF-8
default_timezone=UTC
default_keyboard_layout=us

[network]
enable_network_during_install=true
network_source=dhcp
proxy_enabled=false

[security]
enable_security_updates=true
enable_firewall=true
enable_selinux=false
enable_apparmor=true

[user]
auto_create_user=true
user_name=carrot
user_full_name=Carrot User
auto_login=false

[post_install]
enable_post_install_script=true
post_install_script=/usr/lib/carrot-installer/post-install.sh
set_grub_password=false
update_system=true

[ui]
ui_language=en
show_welcome_screen=true
show_release_notes=true
enable_advanced_options=true

[logging]
log_file=/var/log/carrot-installer.log
log_level=debug
save_logs_to_system=true
