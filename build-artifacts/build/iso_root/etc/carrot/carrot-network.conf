# CarrotOS Network Manager Configuration
# Network connectivity and firewall

[general]
enable_network_management=true
enable_ipv4=true
enable_ipv6=true
dns_mode=auto

[interfaces]
auto_detect=true
auto_connect=true
default_connection_type=dhcp

[ethernet]
enable_ethernet=true
auto_connect_wired=true
dhcp_timeout=30
dhcp_client=systemd-resolved

[wireless]
enable_wireless=true
auto_connect_wireless=false
regulatory_domain=auto
power_save=true

[dns]
dns_server_primary=8.8.8.8
dns_server_secondary=8.8.4.4
dns_ipv6_primary=2001:4860:4860::8888
dns_ipv6_secondary=2001:4860:4860::8844
dns_search_domains=
dnssec_enabled=true

[firewall]
enable_firewall=true
firewall_backend=ufw
default_incoming_policy=deny
default_outgoing_policy=allow
enable_logging=true

[vpn]
enable_vpn=false
vpn_backend=openvpn

[proxy]
enable_proxy=false
http_proxy=
https_proxy=
socks_proxy=

[network_sharing]
enable_sharing=false
shared_connections=
nat_enabled=false

[quality_of_service]
enable_qos=false
bandwidth_limit_mbps=0

[logging]
log_file=/var/log/carrot-network.log
log_level=info
