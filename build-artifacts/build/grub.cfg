### BEGIN /etc/grub.d/00_header ###
set default="0"
set timeout="5"

# Load graphics modules
insmod gfxterm
insmod part_gpt
insmod ext2

# Set graphics mode
set gfxmode=1024x768x32
terminal_output gfxterm

# Define colors
set menu_color_normal=white/black
set menu_color_highlight=black/white

### END /etc/grub.d/00_header ###

### BEGIN /etc/grub.d/10_linux ###
menuentry 'CarrotOS 1.0 (64-bit)' --class gnu-linux --class os {
    insmod gzio
    insmod part_gpt
    insmod ext2
    
    # Set root partition
    set root='(hd0,gpt1)'
    
    # Load kernel
    echo 'Loading CarrotOS Kernel...'
    linux /boot/carrot-kernel root=/dev/sda1 ro quiet splash
    
    # Load initramfs if exists
    if [ -f /boot/initramfs.img ]; then
        echo 'Loading initramfs...'
        initrd /boot/initramfs.img
    fi
    
    echo 'Starting system...'
}

menuentry 'CarrotOS 1.0 (64-bit) - Recovery Mode' --class gnu-linux --class os {
    insmod gzio
    insmod part_gpt
    insmod ext2
    
    set root='(hd0,gpt1)'
    
    echo 'Loading CarrotOS Kernel (Recovery)...'
    linux /boot/carrot-kernel root=/dev/sda1 ro single
    
    echo 'Starting in recovery mode...'
}

menuentry 'UEFI Firmware Settings' {
    fwsetup
}

### END /etc/grub.d/10_linux ###
