# CarrotOS Wayland Configuration
# Main display server settings for Weston

# General
name=carrot-wayland
version=1.0.0

# Backend configuration
[core]
modules=drm-backend.so

# DRM backend (native graphics)
[drm-backend]
output-transformation=normal
pixman-renderer=false
# Use GL renderer if available
use-pixman=0

# Keyboard input
[keyboard]
locale=en_US
layout=us
variant=
options=

# Mouse settings
[cursor]
size=24
theme=default

# Output configuration (display)
[output]
name=HDMI-1
mode=1920x1080@60
transform=normal

# Seat (input device grouping)
[seat]
name=seat0
cursor-theme=default
cursor-size=24
keyboard-layout=us

# Shell (CarrotOS-specific)
[shell]
type=carrot-shell
icon-theme=carrot-icons
theme=carrot-default

# Animations
[animation]
enable-animations=1
fade-in-duration=200

# Performance
[performance]
enable-vsync=1
max-frame-rate=60

# Shell modules
modules=kiosk-shell.so
