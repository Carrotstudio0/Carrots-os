# CarrotOS Kernel Build Configuration
# Defines kernel compilation and linking settings

# Kernel base settings
KERNEL_NAME=carrotos-lts
KERNEL_VERSION=5.15.0
KERNEL_TARGET=x86_64
KERNEL_BITS=64

# Architecture-specific settings
ARCH_FLAGS=-march=x86-64 -mtune=generic
OPTIMIZATION=-O2 -fno-stack-protector

# Kernel features
ENABLE_SMP=1
ENABLE_PREEMPTION=1
ENABLE_SECURITY=1
ENABLE_CGROUP=1

# Module support
MODULE_SUPPORT=1
MAX_MODULES=256

# Device naming scheme
DEVICE_NAMING=predictable

# Debugging
DEBUG_SYMBOLS=1
DEBUG_KERNEL=0
SERIAL_DEBUG=1

# Output
OUTPUT_IMAGE=build/kernel/bzImage
BUILD_LOG=build/logs/kernel-build.log
