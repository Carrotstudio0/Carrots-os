# CarrotOS Update Manager Configuration
# System updates and package management

[general]
enabled=true
auto_check=true
check_interval=3600
auto_update=false

[repositories]
main_repo=https://repo.carrotos.org/main
security_repo=https://repo.carrotos.org/security
community_repo=https://repo.carrotos.org/community
enabled_repos=main,security

[packages]
package_manager=apt
cache_dir=/var/cache/carrot-updates
state_dir=/var/lib/carrot-updates

[snapshots]
enabled=true
max_snapshots=5
compression=xz
retention_days=30

[rollback]
enabled=true
max_rollback_snapshots=3
verification=yes

[security]
verify_signatures=true
gpg_keyring=/etc/apt/trusted.gpg.d/carrot-archive-keyring.gpg
allow_downgrade=false

[notifications]
notify_available_updates=true
notify_failed_updates=true
notify_completion=true

[logging]
log_file=/var/log/carrot-update.log
log_level=info
