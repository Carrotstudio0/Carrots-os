# CarrotOS Driver Manager Configuration
# Hardware detection and driver management

[general]
enabled=true
auto_detect=true
auto_install=true
detection_interval=300

[hardware_detection]
enable_hid=true
enable_net=true
enable_storage=true
enable_gpu=true
enable_sound=true
enable_input=true

[drivers]
driver_cache_dir=/var/cache/carrot-drivers
driver_install_dir=/lib/modules
enable_proprietary=true
firmware_dir=/lib/firmware

[gpu_drivers]
detect_nvidia=true
detect_amd=true
detect_intel=true
nvidia_repository=ubuntu/nonfree
amd_repository=ubuntu/firmware-linux

[audio]
auto_detect_sound_card=true
driver_priority=snd-hda-intel,snd-ens1371,snd-ac97
pulseaudio_enabled=true

[network]
detect_network_devices=true
load_wireless_modules=true
wireless_drivers=rtl8xxxu,ath10k,iwlwifi

[storage]
detect_storage_devices=true
storage_drivers=ahci,nvme,usb-storage
enable_trim=true

[input]
detect_touchpad=true
detect_touchscreen=true
detect_stylus=true

[hotplug]
enable_hotplug=true
auto_load_on_insert=true

[logging]
log_file=/var/log/carrot-driver.log
log_level=info
verbose=false
