# CarrotOS Power Manager Configuration
# Power profiles and performance management

[general]
enabled=true
default_profile=balanced
auto_switching=true

[profiles]
available_profiles=performance,balanced,powersave,custom

[performance]
cpu_scaling_governor=performance
turbo_boost=enabled
min_cpu_frequency=800000
max_cpu_frequency=unlimited
gpu_frequency=max
screen_timeout=never

[balanced]
cpu_scaling_governor=schedutil
turbo_boost=auto
min_cpu_frequency=800000
max_cpu_frequency=auto
gpu_frequency=auto
screen_timeout=300

[powersave]
cpu_scaling_governor=powersave
turbo_boost=disabled
min_cpu_frequency=800000
max_cpu_frequency=1600000
gpu_frequency=min
screen_timeout=120

[cpu]
dynamic_freq_scaling=true
enable_cstate=true
enable_pstate=true
cstate_limit=C3

[gpu]
dynamic_power_management=true
gpu_sclk_scaling=auto
gpu_mclk_scaling=auto

[display]
backlight_control=true
adaptive_brightness=true
brightness_level=50

[battery]
enable_battery_saver=true
battery_threshold_start=20
battery_threshold_stop=80
low_battery_action=warn
critical_battery_action=suspend

[sleep]
enable_sleep=true
sleep_delay=600
hibernate=true
hibernate_delay=3600

[thermal]
enable_thermal_management=true
thermal_zones=x86_pkg_temp,acpitz
fan_control=auto
target_temperature=80

[logging]
log_file=/var/log/carrot-power.log
log_level=info
