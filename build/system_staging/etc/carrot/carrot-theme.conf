# CarrotOS Theme Engine Configuration
# Desktop appearance and theming

[general]
enable_themes=true
default_theme=carrot-default
theme_directory=/usr/share/themes

[appearance]
color_scheme=dark
gtk_theme=carrot-default
qt_theme=carrot-default
icon_theme=Papirus-Dark
cursor_theme=Adwaita

[gtk]
font_name=DejaVu Sans 10
monospace_font_name=DejaVu Sans Mono 9
document_font_name=DejaVu Sans 10

[colors]
primary_color=#FF6B35
secondary_color=#F7931E
accent_color=#04A777
background_color=#1A1A1A
foreground_color=#FFFFFF
error_color=#E74C3C
success_color=#27AE60
warning_color=#F39C12

[window_decoration]
enable_decorations=true
decoration_theme=carrot-default
button_layout=menu:minimize,maximize,close
double_click_to_maximize=true

[animations]
enable_animations=true
animation_speed=medium
transition_duration=200

[opacity]
window_opacity=1.0
transparency_enabled=false
blur_enabled=false
blur_radius=10

[fonts]
system_fonts_dir=/usr/share/fonts
embedded_fonts=true

[cursors]
show_cursor=true
cursor_size=24
cursor_animation=true

[wallpapers]
wallpaper_dir=/usr/share/pixmaps
default_wallpaper=carrot-background.png
slideshow_enabled=false
slideshow_interval=300

[lock_screen]
enable_lock_screen=true
lock_screen_theme=carrot-default
show_wall_clock=true

[notifications]
notification_theme=carrot-default
notification_position=top-right
notification_timeout=5000

[logging]
log_file=/var/log/carrot-theme.log
log_level=info
