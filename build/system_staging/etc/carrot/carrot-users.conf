# CarrotOS User Manager Configuration
# User management and security policies

[general]
enable_user_management=true
auto_create_home=true
default_shell=/bin/bash
umask=0077

[users]
min_uid=1000
max_uid=65534
min_gid=1000
max_gid=65534

[passwords]
min_password_length=8
password_expiration=90
password_history=5
password_algorithm=sha512
enforce_complexity=true

[groups]
required_groups=wheel,audio,video,dialout,plugdev

[sudoers]
sudo_enabled=true
sudo_require_password=true
sudo_password_timeout=15
sudo_log_file=/var/log/sudo.log
sudo_log_commands=true

[account_lockout]
enable_lockout=true
failed_attempts_threshold=5
lockout_duration_seconds=900

[login]
enable_graphical_login=true
login_manager=/usr/sbin/gdm
default_session=carrot-shell
session_timeout=0

[files]
passwd_file=/etc/passwd
shadow_file=/etc/shadow
group_file=/etc/group
sudoers_file=/etc/sudoers
sudoers_d_dir=/etc/sudoers.d

[logging]
log_file=/var/log/carrot-users.log
log_level=info
