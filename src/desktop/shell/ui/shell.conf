# CarrotOS Desktop Configuration

# Display server
display_server: wayland
compositor: weston

# Desktop shell
shell_name: carrot-shell
shell_path: /usr/bin/carrot-shell

# Themeing
theme: carrot-default
icon_theme: carrot-icons-default
font_family: "Ubuntu"
font_size: 11
cursor_theme: default

# Keyboard layout
kb_layout: us
kb_model: pc104
kb_variant: ""
kb_options: "compose:ralt"

# Mouse settings
click_method: clickfinger
scroll_method: two_finger
natural_scroll: true

# Workspace settings
num_workspaces: 4
workspaces:
  - name: "Main"
    layout: "tiling"
  - name: "Web"
    layout: "floating"
  - name: "Work"
    layout: "tiling"
  - name: "Media"
    layout: "floating"

# Panel configuration
panels:
  - id: "top"
    position: top
    height: 32
    items:
      - type: launcher
        command: carrot-launcher
      - type: taskbar
        show_window_titles: true
      - type: system_tray
      - type: clock
        format: "%H:%M"
      - type: audio
      - type: bluetooth
      - type: network
      - type: power

# Session configuration
session_type: wayland
session_timeout_ms: 300000
lock_screen: true
lock_icon: /usr/share/pixmaps/carrot-lock.png

# Startup applications
autostart:
  - /usr/bin/nm-applet
  - /usr/bin/pa-applet
  - /usr/bin/redshift-gtk
