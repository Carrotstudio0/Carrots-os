# CarrotOS EFI Boot Configuration
# UEFI bootloader configuration

set default="0"
set timeout=5

# EFI splash image
background_image /boot/efi/carrotos-splash.png
set color_normal=white/black
set color_highlight=black/white

# Boot entry: Normal boot
menuentry 'CarrotOS' {
    search --no-floppy --label --set=root CARROT-ROOT
    multiboot2 /boot/bzImage root=/dev/mapper/carrot-root ro quiet splash
}

# Boot entry: Safe mode
menuentry 'CarrotOS (Safe Mode)' {
    search --no-floppy --label --set=root CARROT-ROOT
    multiboot2 /boot/bzImage root=/dev/mapper/carrot-root ro single
}

# Boot entry: Recovery mode
menuentry 'CarrotOS (Recovery)' {
    search --no-floppy --label --set=root CARROT-ROOT
    multiboot2 /boot/bzImage root=/dev/mapper/carrot-root ro recovery
}

# Boot entry: Maintenance shell
menuentry 'CarrotOS (Maintenance)' {
    search --no-floppy --label --set=root CARROT-ROOT
    chainloader +1
}
