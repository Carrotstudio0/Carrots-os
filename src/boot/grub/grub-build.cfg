# CarrotOS GRUB Build Configuration
# Defines how the bootloader is built and configured

# Bootloader settings
BUILD_GRUB_VERSION=2.12
BUILD_TARGET=i386-pc
BUILD_MODULES=part_msdos,ext2,multiboot2,normal,configfile

# UEFI support
UEFI_BUILD=1
UEFI_TARGET=x86_64-efi
UEFI_MODULES=part_gpt,fat,multiboot2,normal

# Output directory for built artifacts
OUTPUT_DIR=build/boot/grub
LOG_FILE=build/logs/grub-build.log

# Optimization flags
OPTIMIZE_LEVEL=2
ENABLE_LTO=1
STRIP_SYMBOLS=0
